name: Deploy to Internal Test

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment each upload)'
        required: true
        type: number
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties', 'app/android/**/*.gradle') }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Update version
        run: |
          sed -i "s/versionCode .*/versionCode ${{ inputs.version_code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ inputs.version_name }}\"/" android/app/build.gradle

      - name: Build release AAB
        working-directory: app/android
        env:
          CI: true
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play (Internal Test)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.devheauk.dailyquote
          releaseFiles: app/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
